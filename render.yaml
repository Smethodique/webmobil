services:
  - type: web
    name: fmp-prep-backend
    runtime: python
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && daphne -b 0.0.0.0 -p $PORT fmp_prep.asgi:application
    envVars:
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: "*"
      - key: DJANGO_SECRET_KEY
        value: fmp-prep-prod-secret-change-me-2026
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false

  - type: web
    name: fmp-prep-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile.web
    dockerContext: ./frontend
    envVars:
      - key: API_BASE_URL
        value: https://webmobil.onrender.com/api/v1
